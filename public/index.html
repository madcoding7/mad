<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mad | Browse Freely</title>

    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="/epoxy/index.js"></script>
    <script src="/register-sw.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Lexend:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a;
            --container-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --border: rgba(255, 255, 255, 0.1);
            --font-main: 'Inter', sans-serif;
            --font-title: 'Lexend', sans-serif;
        }

        /* --- THEMES --- */
        body.theme-light {
            --bg: #f1f5f9;
            --container-bg: #ffffff;
            --text: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #e2e8f0;
        }

        body.theme-midnight {
            --bg: #000000;
            --container-bg: #111111;
            --text: #ffffff;
            --accent: #ef4444;
            --accent-hover: #dc2626;
            --border: #333;
        }

        /* --- GLOBAL STYLES --- */
        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        /* Gradient Background for Dark Theme */
        body:not(.theme-light):not(.theme-2007) {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            background-attachment: fixed;
        }

        .main-ui-container {
            width: 90%;
            max-width: 900px;
            margin: 60px auto;
            padding: 40px;
            background: var(--container-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* --- TAB SYSTEM --- */
        .tab-bar {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 5px 10px;
            gap: 5px;
            overflow-x: auto;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px 8px 0 0;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            border: 1px solid transparent;
        }

        .tab.active {
            background: var(--container-bg);
            border: 1px solid var(--border);
            border-bottom: none;
            font-weight: 600;
        }

        .tab-close {
            margin-left: auto;
            opacity: 0.5;
            font-size: 16px;
        }

        .tab-close:hover { opacity: 1; }

        .new-tab-btn {
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            color: var(--accent);
        }

        /* --- HEADER & INPUT --- */
        h1 {
            font-family: var(--font-title);
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(to right, var(--accent), #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .tagline {
            opacity: 0.7;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        #sj-address {
            width: 100%;
            padding: 18px 25px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        body.theme-light #sj-address { color: #000; background: #f1f5f9; }

        #sj-address:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        .primary-btn {
            position: absolute;
            right: 8px;
            top: 8px;
            padding: 10px 25px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .primary-btn:hover { background: var(--accent-hover); transform: scale(1.05); }

        /* --- PROXY OVERLAY --- */
        #proxy-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 9999;
            display: none;
            flex-direction: column;
        }

        .proxy-nav {
            height: 50px;
            background: var(--container-bg);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .proxy-nav input {
            flex-grow: 1;
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.1);
            color: var(--text);
        }

        iframe {
            flex-grow: 1;
            border: none;
            background: white;
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        /* (Keep Frutiger Aero CSS from previous version or integrate similarly) */
    </style>
</head>

<body>

    <div id="proxy-tabs" class="tab-bar" style="display:none;">
        <div id="tabs-container" style="display:flex; gap:5px;"></div>
        <div class="new-tab-btn" onclick="createNewTab()">+</div>
    </div>

    <div class="main-ui-container" id="main-menu">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <div style="font-family: var(--font-title); font-weight: 700; color: var(--accent)">MAD v2</div>
            <div style="display:flex; gap: 15px;">
                <select id="style-select" style="background:transparent; color:var(--text); border:1px solid var(--border); border-radius:5px; padding:5px;">
                    <option value="default">Dark (Default)</option>
                    <option value="light">Light Mode</option>
                    <option value="midnight">Midnight</option>
                    <option value="2007">Frutiger Aero</option>
                </select>
            </div>
        </div>

        <h1>MAD</h1>
        <p class="tagline">The most powerful way to browse the web, unrestricted.</p>

        <form id="sj-form" class="search-container">
            <input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
            <input id="sj-address" type="text" placeholder="Enter URL or search freely..." autocomplete="off" />
            <button type="submit" class="primary-btn" id="sj-btn">Launch</button>
        </form>
        
        <div id="error-msg" style="color: #ef4444; margin-top: 20px; display:none;"></div>
    </div>

    <div id="proxy-overlay">
        <div class="proxy-nav">
            <button onclick="exitProxy()" style="background:transparent; border:1px solid var(--border); color:var(--text); cursor:pointer; padding:5px 10px; border-radius:5px;">Home</button>
            <input id="proxy-nav-input" type="text" />
            <button onclick="refreshTab()" style="background:transparent; border:none; color:var(--text); cursor:pointer;">↻</button>
        </div>
        <div id="iframe-container" style="flex-grow:1; display:flex; flex-direction:column;"></div>
    </div>

    <script>
        "use strict";

        // Tab Management
        let tabs = [];
        let activeTabId = null;

        const themeSelect = document.getElementById('style-select');
        themeSelect.addEventListener('change', (e) => {
            document.body.className = ''; 
            if(e.target.value !== 'default') document.body.classList.add('theme-' + e.target.value);
            localStorage.setItem('mad-theme', e.target.value);
        });

        // Load saved theme
        const savedTheme = localStorage.getItem('mad-theme');
        if(savedTheme) {
            themeSelect.value = savedTheme;
            if(savedTheme !== 'default') document.body.classList.add('theme-' + savedTheme);
        }

        async function createNewTab(url = "") {
            const id = Date.now();
            const tab = { id, url, title: "New Tab" };
            tabs.push(tab);
            renderTabs();
            switchTab(id);
            if(url) loadUrlInTab(id, url);
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            tabs.forEach(tab => {
                const el = document.createElement('div');
                el.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
                el.onclick = () => switchTab(tab.id);
                el.innerHTML = `
                    <span>${tab.title}</span>
                    <span class="tab-close" onclick="closeTab(event, ${tab.id})">×</span>
                `;
                container.appendChild(el);
            });
        }

        function switchTab(id) {
            activeTabId = id;
            document.querySelectorAll('.proxy-frame').forEach(f => f.style.display = 'none');
            const activeFrame = document.getElementById(`frame-${id}`);
            if(activeFrame) {
                activeFrame.style.display = 'block';
                document.getElementById('proxy-nav-input').value = tabs.find(t => t.id === id).url;
            }
            renderTabs();
        }

        function closeTab(e, id) {
            e.stopPropagation();
            tabs = tabs.filter(t => t.id !== id);
            const frame = document.getElementById(`frame-${id}`);
            if(frame) frame.remove();
            if(activeTabId === id && tabs.length > 0) switchTab(tabs[0].id);
            if(tabs.length === 0) exitProxy();
            renderTabs();
        }

        // Initialize Scramjet
        window.addEventListener('load', async () => {
            const form = document.getElementById("sj-form");
            const address = document.getElementById("sj-address");
            
            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                const val = address.value.trim();
                if(!val) return;
                
                document.getElementById('proxy-overlay').style.display = 'flex';
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('proxy-tabs').style.display = 'flex';
                
                const url = val.includes('.') ? (val.startsWith('http') ? val : 'https://' + val) : `https://www.google.com/search?q=${encodeURIComponent(val)}`;
                
                // Logic to handle Service Worker and Scramjet setup here (inherited from your previous code)
                const id = Date.now();
                const frameContainer = document.getElementById('iframe-container');
                const iframe = document.createElement('iframe');
                iframe.id = `frame-${id}`;
                iframe.className = 'proxy-frame';
                // In a real setup, you'd use your scramjet.createFrame() logic here
                iframe.src = `/scram/service/${btoa(url)}`; 
                frameContainer.appendChild(iframe);
                
                tabs.push({ id, url, title: val });
                activeTabId = id;
                renderTabs();
                switchTab(id);
            });
        });

        window.exitProxy = () => {
            location.reload(); // Simple reset
        };
    </script>
</body>
</html>
